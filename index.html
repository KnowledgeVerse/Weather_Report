<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Bulletin System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Auto-hide controls when sidebar collapses */
      body.sidebar-collapsed .sidebar-footer-controls {
        opacity: 0;
        pointer-events: none;
      }
      .sidebar-footer-controls {
        transition: opacity 0.3s ease;
      }
      body.sidebar-collapsed .sidebar:hover .sidebar-footer-controls {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <!-- Weather Particle Canvas -->
    <canvas id="weatherCanvas" class="weather-canvas"></canvas>

    <!-- Animated Background Layers -->
    <div class="bg-layer bg-sky"></div>
    <div class="bg-layer bg-storm"></div>
    <div class="bg-layer bg-sunset"></div>

    <!-- Floating Clouds -->
    <div class="clouds-container">
      <div class="cloud cloud-1">
        <img src="assets/weather-icons/cloud.png" alt="cloud" />
      </div>
      <div class="cloud cloud-2">
        <img src="assets/weather-icons/cloud.png" alt="cloud" />
      </div>
      <div class="cloud cloud-3">
        <img src="assets/weather-icons/cloud.png" alt="cloud" />
      </div>
      <div class="cloud cloud-4">
        <img src="assets/weather-icons/cloud.png" alt="cloud" />
      </div>
      <div class="cloud cloud-5">
        <img src="assets/weather-icons/cloud.png" alt="cloud" />
      </div>
    </div>

    <!-- Lightning Flash Overlay -->
    <div class="lightning-flash"></div>

    <!-- Fog Layer -->
    <div class="fog-layer"></div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" id="mobileMenuToggle">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <img
            src="assets/weather-icons/sun.png"
            alt="Weather Logo"
            class="logo-icon"
          />
          <span class="logo-text" data-key="appName">Weather</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <ul class="nav-list">
          <li class="nav-item">
            <a
              href="https://biharmausam.com/"
              class="nav-link"
              title="Go to Bihar Mausam"
            >
              <span class="nav-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="2" y1="12" x2="22" y2="12"></line>
                  <path
                    d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                  ></path>
                </svg>
              </span>
              <span class="nav-text">Main Home</span>
            </a>
          </li>

          <li class="nav-item active">
            <a
              href="dashboard.html"
              class="nav-link"
              id="nav-dashboard"
              target="main-frame"
              onclick="updateNav(this, 'Dashboard')"
            >
              <span class="nav-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                  ></path>
                  <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
              </span>
              <span class="nav-text" data-key="home">Home</span>
            </a>
          </li>

          <li class="nav-divider">
            <span data-key="reportGenerator">Report Generator</span>
          </li>

          <li class="nav-item">
            <a
              href="Weekly/"
              class="nav-link"
              id="nav-weekly"
              target="main-frame"
              onclick="updateNav(this, 'Weekly Report')"
            >
              <span class="nav-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
              </span>
              <span class="nav-text" data-key="weeklyReport"
                >Weekly Report</span
              >
            </a>
          </li>

          <li class="nav-item">
            <a
              href="Monthly/"
              class="nav-link"
              id="nav-monthly"
              target="main-frame"
              onclick="updateNav(this, 'Monthly Report')"
            >
              <span class="nav-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                  <path d="M8 14h.01"></path>
                  <path d="M12 14h.01"></path>
                  <path d="M16 14h.01"></path>
                  <path d="M8 18h.01"></path>
                  <path d="M12 18h.01"></path>
                  <path d="M16 18h.01"></path>
                </svg>
              </span>
              <span class="nav-text" data-key="monthlyReport"
                >Monthly Report</span
              >
            </a>
          </li>

          <li class="nav-item">
            <a
              href="Extended/"
              class="nav-link"
              id="nav-extended"
              target="main-frame"
              onclick="updateNav(this, 'Extended Report')"
            >
              <span class="nav-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M17.5 19c0-1.7-1.3-3-3-3c-1.1 0-2.1.6-2.6 1.5c-.5-.9-1.5-1.5-2.6-1.5c-1.7 0-3 1.3-3 3"
                  ></path>
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M8 13a4 4 0 1 1 8 0"></path>
                </svg>
              </span>
              <span class="nav-text" data-key="extendedReport"
                >Extended Report</span
              >
            </a>
          </li>
        </ul>
      </nav>

      <div
        class="sidebar-footer"
        style="padding: 15px; display: flex; flex-direction: column; gap: 15px"
      >
        <div
          class="sidebar-footer-controls"
          style="display: flex; flex-direction: column; gap: 15px"
        >
          <!-- Language Toggle -->
          <div
            class="language-toggle"
            style="
              width: 100%;
              justify-content: center;
              background: rgba(255, 255, 255, 0.05);
              border: 1px solid var(--glass-border);
            "
          >
            <button class="lang-btn active" data-lang="en">EN</button>
            <span class="lang-divider">|</span>
            <button class="lang-btn" data-lang="hi">हिन्दी</button>
          </div>

          <div
            style="
              display: flex;
              justify-content: center;
              gap: 15px;
              align-items: center;
            "
          >
            <!-- Dark Mode Toggle -->
            <button
              class="theme-toggle"
              id="themeToggle"
              aria-label="Toggle Dark Mode"
              style="margin: 0; width: 40px; height: 40px"
            >
              <span class="theme-icon sun">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="12" cy="12" r="5"></circle>
                  <line x1="12" y1="1" x2="12" y2="3"></line>
                  <line x1="12" y1="21" x2="12" y2="23"></line>
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                  <line x1="1" y1="12" x2="3" y2="12"></line>
                  <line x1="21" y1="12" x2="23" y2="12"></line>
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
              </span>
              <span class="theme-icon moon">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                  ></path>
                </svg>
              </span>
            </button>

            <!-- Background Color Picker -->
            <div
              class="bg-color-picker"
              title="Change Background Color"
              style="
                width: 40px;
                height: 40px;
                border-radius: 50%;
                overflow: hidden;
                border: 1px solid var(--glass-border);
                position: relative;
              "
            >
              <input
                type="color"
                id="globalBgColor"
                value="#667eea"
                style="
                  position: absolute;
                  top: -50%;
                  left: -50%;
                  width: 200%;
                  height: 200%;
                  cursor: pointer;
                  background: transparent;
                  border: none;
                "
                onchange="applyGlobalBackground(this.value)"
              />
            </div>
          </div>
        </div>
        <p class="version">v1.0.0</p>
      </div>
    </aside>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <div class="top-bar-left" style="display: flex; align-items: center">
          <button
            id="desktopMenuToggle"
            aria-label="Toggle Sidebar"
            style="
              background: transparent;
              border: none;
              color: var(--text-white);
              cursor: pointer;
              padding: 5px;
              margin-right: 15px;
              display: flex;
              align-items: center;
              justify-content: center;
              transition: all 0.3s;
            "
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <h1 class="page-title" data-key="dashboard">Dashboard</h1>
        </div>
      </header>

      <!-- Main Frame for Pages -->
      <iframe
        name="main-frame"
        id="main-frame"
        src="dashboard.html"
        style="
          width: 100%;
          height: calc(100vh - 80px);
          border: none;
          border-radius: 20px;
          background: transparent;
        "
      ></iframe>

      <!-- Footer Placeholder -->
      <div id="footer-placeholder" style="margin-top: 20px"></div>
    </main>

    <!-- Page Transition Loader -->
    <div class="page-loader" id="pageLoader">
      <div class="loader-content">
        <div class="loader-spinner">
          <img
            src="assets/weather-icons/sun.png"
            alt="Loading"
            class="loader-icon"
          />
        </div>
        <p class="loader-text" data-key="loading">Loading...</p>
      </div>
    </div>

    <!-- Scripts -->
    <script src="js/language.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/main.js"></script>

    <script>
      // Update sidebar active state and title without reloading page
      function updateNav(linkElement, title) {
        document
          .querySelectorAll(".nav-item")
          .forEach((item) => item.classList.remove("active"));
        if (linkElement) {
          linkElement.parentElement.classList.add("active");
        }
        document.querySelector(".page-title").textContent = title;

        // Auto-hide the sidebar on desktop when opening a report
        if (title !== "Dashboard" && window.innerWidth > 1024) {
          document.body.classList.add("sidebar-collapsed");
        } else if (title === "Dashboard" && window.innerWidth > 1024) {
          document.body.classList.remove("sidebar-collapsed");
        }

        // Auto-hide on mobile
        if (window.innerWidth <= 1024) {
          document.getElementById("sidebar").classList.remove("active");
          const overlay = document.getElementById("sidebarOverlay");
          if (overlay) overlay.classList.remove("active");
        }
      }

      // Toggle button click logic
      document
        .getElementById("desktopMenuToggle")
        .addEventListener("click", function () {
          document.body.classList.toggle("sidebar-collapsed");
        });

      // Function to apply background color globally
      function applyGlobalBackground(color) {
        // Apply to parent
        document.body.style.background = color;
        // Apply to iframe
        const iframe = document.getElementById("main-frame");
        if (
          iframe &&
          iframe.contentWindow &&
          iframe.contentWindow.document &&
          iframe.contentWindow.document.body
        ) {
          iframe.contentWindow.document.body.style.background = color;
        }
        // Store preference
        localStorage.setItem("weather-app-bg", color);
      }

      // Sync theme and language to iframe whenever they are changed in parent
      window.addEventListener("themechange", (e) => {
        const iframe = document.getElementById("main-frame");
        if (
          iframe &&
          iframe.contentWindow &&
          iframe.contentWindow.themeManager
        ) {
          iframe.contentWindow.themeManager.setTheme(e.detail.theme);
        }
      });

      window.addEventListener("languagechange", (e) => {
        const iframe = document.getElementById("main-frame");
        if (
          iframe &&
          iframe.contentWindow &&
          iframe.contentWindow.languageManager
        ) {
          iframe.contentWindow.languageManager.setLanguage(e.detail.language);
        }
      });

      // When iframe loads a new page, auto-apply current settings to it
      document
        .getElementById("main-frame")
        .addEventListener("load", function () {
          const iframeWindow = this.contentWindow;
          const savedBg = localStorage.getItem("weather-app-bg");
          if (savedBg && iframeWindow.document && iframeWindow.document.body) {
            iframeWindow.document.body.style.background = savedBg;
          }
          if (window.themeManager && iframeWindow.themeManager) {
            iframeWindow.themeManager.setTheme(
              window.themeManager.getCurrentTheme(),
            );
          }
          if (window.languageManager && iframeWindow.languageManager) {
            iframeWindow.languageManager.setLanguage(
              window.languageManager.getCurrentLanguage(),
            );
          }
        });

      // Restore Background on parent load
      document.addEventListener("DOMContentLoaded", () => {
        const savedBg = localStorage.getItem("weather-app-bg");
        if (savedBg) {
          document.getElementById("globalBgColor").value = savedBg;
          document.body.style.background = savedBg;
        }
      });

      // Load Footer dynamically
      document.addEventListener("DOMContentLoaded", () => {
        fetch("footer.html")
          .then((response) => response.text())
          .then((html) => {
            document.getElementById("footer-placeholder").innerHTML = html;
          })
          .catch((error) => console.error("Error loading footer:", error));
      });
    </script>
  </body>
</html>
